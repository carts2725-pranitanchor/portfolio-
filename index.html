<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Anchor Pranit | Star of India</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --gold: #d4af37; --bg: #000; }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background: var(--bg); color: #fff; font-family: 'Poppins', sans-serif; overflow-x: hidden; }

        /* HERO ENTRY SCREEN */
        #intro-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #000; z-index: 10000; display: flex; flex-direction: column;
            justify-content: center; align-items: center; animation: fadeOut 3.5s forwards;
        }
        .intro-text { font-size: 1.2rem; color: var(--gold); letter-spacing: 4px; opacity: 0; animation: textZoom 1s forwards; margin: 5px; }
        @keyframes textZoom { to { opacity: 1; transform: scale(1.2); } }
        @keyframes fadeOut { 85% { opacity: 1; } 100% { opacity: 0; visibility: hidden; } }

        /* STAR HEADER */
        .hero { padding: 60px 20px; text-align: center; background: radial-gradient(circle, #1a1a1a 0%, #000 100%); }
        .neon-name { font-size: 3.5rem; color: var(--gold); text-shadow: 0 0 20px var(--gold); margin-bottom: 10px; animation: glow 2s infinite alternate; }
        @keyframes glow { from { opacity: 0.8; } to { opacity: 1; text-shadow: 0 0 30px #fffb00; } }
        .main-img { width: 90%; max-width: 400px; border: 3px solid var(--gold); border-radius: 20px; box-shadow: 0 0 30px rgba(212,175,55,0.4); }

        /* INDIA MAP WITH FLYING PLANE */
        .map-container { padding: 40px 20px; text-align: center; position: relative; background: #050505; margin: 20px 0; }
        .india-map { width: 280px; height: 320px; margin: 0 auto; position: relative; border: 1px solid #222; border-radius: 15px; background: url('https://upload.wikimedia.org/wikipedia/commons/e/e0/India_map_blank.svg') no-repeat center; background-size: contain; opacity: 0.7; }
        .plane-path { position: absolute; top: 55%; left: 50%; width: 10px; height: 10px; background: var(--gold); border-radius: 50%; box-shadow: 0 0 15px var(--gold); }
        .plane-icon { position: absolute; color: var(--gold); font-size: 1.2rem; animation: flyPlane 6s infinite ease-in-out; }
        @keyframes flyPlane {
            0% { transform: translate(0, 0) rotate(0deg); opacity: 1; }
            25% { transform: translate(80px, -100px) rotate(-45deg); } /* North */
            50% { transform: translate(-80px, -50px) rotate(-90deg); } /* West */
            75% { transform: translate(50px, 80px) rotate(45deg); } /* South */
            100% { transform: translate(0, 0) rotate(0deg); opacity: 1; }
        }

        /* GALLERY & VIDEOS */
        .section-h { color: var(--gold); text-align: center; margin: 30px 0; letter-spacing: 2px; }
        .video-box { display: flex; overflow-x: auto; gap: 15px; padding: 0 20px; scroll-snap-type: x mandatory; }
        .v-card { flex: 0 0 85%; height: 500px; border: 2px solid #333; border-radius: 20px; overflow: hidden; scroll-snap-align: center; }
        .v-card iframe { width: 100%; height: 100%; border: none; }

        .gallery { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; padding: 15px; }
        .gallery img { width: 100%; height: 120px; object-fit: cover; background: #111; border-radius: 8px; cursor: pointer; transition: 0.3s; }
        .gallery img:hover { transform: scale(1.05); border: 1px solid var(--gold); }

        /* CLICK TO PRESENT (LIGHTBOX) */
        .gallery img:active { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%) scale(2.5); z-index: 10000; outline: 1000px solid rgba(0,0,0,0.9); border-radius: 5px; }

        /* FLOATING CONTACT BAR */
        .f-bar { position: fixed; bottom: 0; width: 100%; background: rgba(0,0,0,0.95); display: flex; justify-content: space-around; padding: 12px 0; border-top: 2px solid var(--gold); z-index: 999; }
        .f-item { color: #fff; text-decoration: none; font-size: 0.8rem; text-align: center; }
        .wa-icon { color: #25d366; font-size: 1.4rem; }

        .footer { padding: 40px 20px 100px; text-align: center; background: #0a0a0a; border-top: 1px solid #222; }
    </style>
</head>
<body>

    <div id="intro-overlay">
        <div class="intro-text" style="animation-delay: 0.5s;">THE VOICE</div>
        <div class="intro-text" style="animation-delay: 1.5s;">THE ENERGY</div>
        <div class="intro-text" style="animation-delay: 2.5s;">ANCHOR PRANIT</div>
    </div>

    <div class="hero">
        <h1 class="neon-name">PRANIT</h1>
        <p style="color: #888; font-size: 0.9rem;">BHILAI'S PRIDE | INDIA'S VOICE</p>
        <img src="1001089154jpg.jpg" class="main-img">
    </div>

    <div class="map-container">
        <h2 class="section-h">PAN INDIA PRESENCE</h2>
        <div class="india-map">
            <div class="plane-path">
                <i class="fas fa-plane plane-icon"></i>
            </div>
        </div>
        <p style="margin-top: 10px; color: var(--gold); font-size: 0.8rem;">Raipur • Mumbai • Delhi • Goa • Pune</p>
    </div>

    <h2 class="section-h">LATEST SHOWS</h2>
    <div class="video-box">
        <div class="v-card"><iframe src="https://www.youtube.com/embed/8nSQub7WxqY"></iframe></div>
        <div class="v-card"><iframe src="https://www.youtube.com/embed/8us7_eIYkKY"></iframe></div>
        <div class="v-card"><iframe src="https://www.youtube.com/embed/eb2c1VEZ_cs"></iframe></div>
    </div>

    <h2 class="section-h">GALLERY</h2>
    <div class="gallery">
        <img src="FB_IMG_1776976796509.jpg" onclick="">
        <img src="FB_IMG_1776976802542.jpg" onclick="">
        <img src="FB_IMG_1776976813216.jpg" onclick="">
        <img src="FB_IMG_1776976829871.jpg" onclick="">
        <img src="FB_IMG_1776976838389.jpg" onclick="">
        <img src="FB_IMG_1776976845221.jpg" onclick="">
    </div>

    <div class="footer">
        <h3 style="color: var(--gold);">CHARODA, BHILAI</h3>
        <p>Chhattisgarh, India</p>
        <p style="margin-top: 20px; color: #555;">Professional Website by<br><b style="color: var(--gold);">Prachi CREATION</b></p>
    </div>

    <div class="f-bar">
        <a href="tel:7000046203" class="f-item">
            <i class="fas fa-phone gold"></i><br>CALL
        </a>
        <a href="https://wa.me/917000046203" class="f-item">
            <i class="fab fa-whatsapp wa-icon"></i><br>WHATSAPP
        </a>
    </div>

</body>
</html>
