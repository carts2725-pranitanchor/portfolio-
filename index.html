<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Anchor Pranit Phutane | Professional Host</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        :root { --gold: #d4af37; --black: #111; --white: #ffffff; }
        body { margin: 0; font-family: 'Poppins', sans-serif; background: var(--black); color: var(--white); }
        
        /* Header Section */
        header { padding: 50px 20px; text-align: center; border-bottom: 3px solid var(--gold); background: #000; }
        header h1 { color: var(--gold); font-size: 2.5rem; margin: 0; text-transform: uppercase; }
        header p { font-size: 1.1rem; letter-spacing: 2px; color: #ccc; }

        /* Section Styling */
        section { padding: 30px 5%; }
        h2 { color: var(--gold); border-bottom: 2px solid var(--gold); display: inline-block; margin-bottom: 20px; }

        /* Video Scroll (Shorts ke liye) */
        .video-container { display: flex; overflow-x: auto; gap: 15px; padding-bottom: 15px; }
        .video-box { min-width: 280px; height: 500px; background: #222; border-radius: 12px; overflow: hidden; border: 1px solid #333; }
        
        /* Photo Grid */
        .photo-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 10px; }
        .photo-grid img { width: 100%; height: 220px; object-fit: cover; border-radius: 8px; border: 1px solid #444; }

        /* Booking Section */
        .booking { text-align: center; background: #1a1a1a; padding: 40px 20px; border-radius: 15px; margin: 20px; }
        .whatsapp-btn { background: #25d366; color: white; padding: 15px 35px; text-decoration: none; border-radius: 50px; font-weight: bold; display: inline-block; font-size: 1.2rem; transition: 0.3s; }
        
        footer { text-align: center; padding: 20px; font-size: 0.8rem; color: #777; }
    </style>
</head>
<body>

    <header>
        <h1>Anchor Pranit Phutane</h1>
        <p>Wedding • Corporate • Live Events</p>
    </header>

    <section id="videos">
        <h2>Program Highlights (Shorts)</h2>
        <p style="font-size: 0.9rem; color: #888;">Swipe left to see more videos →</p>
        <div class="video-container">
            <div class="video-box">
                <iframe width="100%" height="100%" src="https://www.youtube.com/embed/VIDEO_ID_1" frameborder="0" allowfullscreen></iframe>
            </div>
            <div class="video-box">
                <iframe width="100%" height="100%" src="https://www.youtube.com/embed/VIDEO_ID_2" frameborder="0" allowfullscreen></iframe>
            </div>
            <div class="video-box">
                <iframe width="100%" height="100%" src="https://www.youtube.com/embed/VIDEO_ID_3" frameborder="0" allowfullscreen></iframe>
            </div>
        </div>
    </section>

    <section id="photos">
        <h2>Event Gallery</h2>
        <div class="photo-grid">
            <img src="https://via.placeholder.com/300x450?text=Pranit+Photo+1" alt="Event 1">
            <img src="https://via.placeholder.com/300x450?text=Pranit+Photo+2" alt="Event 2">
            <img src="https://via.placeholder.com/300x450?text=Pranit+Photo+3" alt="Event 3">
            <img src="https://via.placeholder.com/300x450?text=Pranit+Photo+4" alt="Event 4">
        </div>
    </section>

    <section class="booking">
        <h2>Book Your Date</h2>
        <p>Available for shows and events across India.</p>
        <br>
        <a href="https://wa.me/919371740005" class="whatsapp-btn">Chat on WhatsApp</a>
        <p style="margin-top: 15px;">Call: +91 9371740005</p>
    </section>

    <footer>
        &copy; 2026 Anchor Pranit Phutane. All Rights Reserved.
    </footer>

</body>
</html>
