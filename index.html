<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Anchor Pranit | The Star of India</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --gold: #d4af37; --neon: #fffb00; --bg: #000; }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background: var(--bg); color: #fff; font-family: 'Poppins', sans-serif; overflow-x: hidden; text-align: center; }

        /* HERO ENTRY ANIMATION */
        #intro-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #000; z-index: 9999; display: flex; flex-direction: column;
            justify-content: center; align-items: center; animation: fadeOut 4s forwards;
        }
        .intro-text { font-size: 1.5rem; color: var(--gold); letter-spacing: 5px; opacity: 0; animation: textAppear 1s forwards; }
        @keyframes textAppear { to { opacity: 1; transform: scale(1.1); } }
        @keyframes fadeOut { 80% { opacity: 1; } 100% { opacity: 0; visibility: hidden; } }

        /* GOLDEN PARTICLES BACKGROUND */
        canvas { position: fixed; top: 0; left: 0; z-index: -1; }

        /* NEON TEXT & HERO SECTION */
        .neon-text { 
            color: var(--gold); font-size: 3rem; text-shadow: 0 0 20px var(--gold);
            animation: glow 2s infinite alternate; margin-top: 20px;
        }
        @keyframes glow { from { text-shadow: 0 0 10px var(--gold); } to { text-shadow: 0 0 30px var(--neon), 0 0 50px var(--gold); } }

        .hero { padding: 80px 20px; position: relative; }
        .main-poster { 
            width: 90%; max-width: 450px; border-radius: 30px; 
            border: 4px solid var(--gold); box-shadow: 0 0 40px rgba(212,175,55,0.6);
            transition: 0.5s; animation: heroEntry 2s ease-out;
        }
        @keyframes heroEntry { from { transform: scale(0.8); opacity: 0; } to { transform: scale(1); opacity: 1; } }

        /* INDIA MAP WAGON WHEEL */
        .map-section { padding: 50px 20px; background: rgba(10,10,10,0.8); margin: 20px; border-radius: 20px; border: 1px solid #222; }
        .wagon-wheel { 
            width: 280px; height: 280px; margin: 30px auto; border: 1px dashed var(--gold); 
            border-radius: 50%; position: relative; animation: rotateWheel 20s linear infinite;
        }
        @keyframes rotateWheel { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        .center-point { 
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); 
            color: #fff; background: var(--gold); padding: 5px 15px; border-radius: 20px; font-weight: bold;
        }
        .spoke { 
            position: absolute; height: 2px; background: linear-gradient(90deg, var(--gold), transparent); 
            width: 140px; top: 50%; left: 50%; transform-origin: left; 
        }

        /* VIDEO & GALLERY */
        .section-title { color: var(--gold); margin: 40px 0 20px; letter-spacing: 3px; }
        .video-slider { display: flex; overflow-x: auto; gap: 20px; padding: 20px; scroll-snap-type: x mandatory; }
        .video-card { flex: 0 0 85%; border-radius: 20px; overflow: hidden; border: 2px solid #333; height: 500px; }
        .video-card iframe { width: 100%; height: 100%; border: none; }

        .gallery { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; padding: 20px; }
        .gallery img { 
            width: 100%; height: 150px; object-fit: contain; background: #111; 
            border-radius: 12px; border: 1px solid #333; transition: 0.4s;
        }
        .gallery img:active { transform: scale(1.8); z-index: 100; box-shadow: 0 0 100px #000; }

        /* ADDRESS & CONTACT BAR */
        .address-box { padding: 40px 20px; background: #0a0a0a; margin-top: 30px; border-radius: 30px 30px 0 0; border-top: 2px solid var(--gold); }
        .floating-bar { 
            position: fixed; bottom: 0; width: 100%; background: rgba(0,0,0,0.95); 
            display: flex; justify-content: space-around; padding: 15px 0; border-top: 1px solid var(--gold); z-index: 1000; 
        }
        .action-btn { color: #fff; text-decoration: none; font-weight: bold; display: flex; flex-direction: column; align-items: center; gap: 5px; }
        .whatsapp-icon { color: #25d366; font-size: 1.5rem; }
    </style>
</head>
<body>

    <div id="intro-overlay">
        <div class="intro-text" style="animation-delay: 0.5s;">THE VOICE</div>
        <div class="intro-text" style="animation-delay: 1.5s;">THE ENERGY</div>
        <div class="intro-text" style="animation-delay: 2.5s;">ANCHOR PRANIT</div>
    </div>

    <div class="hero">
        <h1 class="neon-text">PRANIT</h1>
        <p style="color: #888; letter-spacing: 4px;">INDIA'S CELEBRITY HOST</p>
        <img src="1001089154jpg.jpg" class="main-poster">
    </div>

    <div class="map-section">
        <h2 class="section-title">PAN INDIA PRESENCE</h2>
        <div class="wagon-wheel">
            <div class="center-point">BHILAI</div>
            <div class="spoke" style="transform: rotate(0deg);"></div>
            <div class="spoke" style="transform: rotate(60deg);"></div>
            <div class="spoke" style="transform: rotate(120deg);"></div>
            <div class="spoke" style="transform: rotate(180deg);"></div>
            <div class="spoke" style="transform: rotate(240deg);"></div>
            <div class="spoke" style="transform: rotate(300deg);"></div>
        </div>

    </div>

    <h2 class="section-title">PERFORMANCES</h2>
    <div class="video-slider">
        <div class="video-card"><iframe src="https://www.youtube.com/embed/8nSQub7WxqY"></iframe></div>
        <div class="video-card"><iframe src="https://www.youtube.com/embed/8us7_eIYkKY"></iframe></div>
        <div class="video-card"><iframe src="https://www.youtube.com/embed/eb2c1VEZ_cs"></iframe></div>
    </div>

    <h2 class="section-title">MOMENTS</h2>
    <div class="gallery">
        <img src="FB_IMG_1776976796509.jpg"> <img src="FB_IMG_1776976802542.jpg"> <img src="FB_IMG_1776976813216.jpg">
        <img src="FB_IMG_1776976829871.jpg"> <img src="FB_IMG_1776976838389.jpg"> <img src="FB_IMG_1776976845221.jpg">
    </div>

    <div class="address-box">
        <h3 style="color: var(--gold); margin-bottom: 10px;">CONTACT OFFICE</h3>
        <p>Charoda, Bhilai,<br>Chhattisgarh - 490021</p>
    </div>

    <div class="floating-bar">
        <a href="tel:7000046203" class="action-btn">
            <i class="fas fa-phone gold"></i> 7000046203
        </a>
        <a href="https://wa.me/917000046203" class="action-btn">
            <i class="fab fa-whatsapp whatsapp-icon"></i> WHATSAPP
        </a>
    </div>

    <footer style="padding-bottom: 100px; color: #444;">
        Professional Branding by<br>
        <span style="color: var(--gold); font-weight: bold;">Prachi CREATION</span>
    </footer>

</body>
</html>
