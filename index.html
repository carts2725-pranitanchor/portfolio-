<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Anchor Pranit Official</title>
    <style>
        :root { --gold: #f1c40f; --bg: #000; --red: #8b0000; }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background: var(--bg); color: #fff; font-family: sans-serif; overflow-x: hidden; width: 100%; height: 100%; text-align: center; }

        /* POSTER AREA */
        .poster-area { position: relative; width: 95%; max-width: 800px; margin: 15px auto; border: 3px solid var(--gold); border-radius: 12px; overflow: hidden; aspect-ratio: 16/9; }
        
        /* Fixed Video Poster (Muted is Key for Playback) */
        .hero-banner { width: 100%; height: 100%; object-fit: cover; }
        
        /* PARDA ACTION */
        .parda-box { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 20; background: var(--red); background-image: repeating-linear-gradient(90deg, #8b0000 0, #8b0000 15px, #a50000 20px); transition: 2s cubic-bezier(0.4, 0, 0.2, 1); display: flex; justify-content: center; align-items: center; }
        .parda-text { color: var(--gold); font-size: 2.5rem; text-transform: uppercase; font-weight: bold; transform: scale(1.1); text-shadow: 0 0 15px var(--gold); }
        .open-curtain .parda-box { transform: translateY(-100%); }

        /* TEXT STYLING */
        .shaan { color: #fff; letter-spacing: 3px; font-size: 1rem; text-transform: uppercase; margin-top: 25px; }
        .name { font-size: 3rem; color: var(--gold); font-weight: bold; text-transform: uppercase; line-height: 1.1; margin-top: 5px; }

        /* VIDEO SHOWREELS */
        .video-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 15px; width: 95%; max-width: 1000px; margin: 25px auto; padding-bottom: 30px; }
        .v-card { background: #111; padding: 5px; border-radius: 10px; border: 1px solid #333; transition: 0.3s; }
        .v-card:hover { border-color: var(--gold); transform: scale(1.02); }
        video { width: 100%; border-radius: 8px; background: #000; display: block; height: auto; aspect-ratio: 16/9; cursor: pointer; }

        /* WAGON WHEEL MAP */
        .map-section { background: #0a0a0a; padding: 40px 10px; border-top: 2px solid var(--gold); margin-top: 20px; }
        .map-box { position: relative; width: 100%; max-width: 320px; margin: auto; border: 1px solid #222; border-radius: 10px; padding: 10px; background: #111; box-shadow: 0 0 15px rgba(241, 196, 15, 0.2); }
        .wagon-wheel-svg { width: 100%; height: auto; filter: drop-shadow(0 0 12px rgba(241, 196, 15, 0.6)); }
        
        /* CONTACT FOOTER */
        .contact-bar { display: flex; gap: 10px; width: 95%; max-width: 800px; margin: 20px auto; }
        .c-btn { flex: 1; color: #fff; text-decoration: none; font-size: 0.9rem; background: #1a1a1a; padding: 15px; border-radius: 8px; border: 1px solid #333; font-weight: bold; transition: 0.3s; }
        .c-btn:hover { background: #333; border-color: var(--gold); }
        .g-num { color: var(--gold); display: block; margin-top: 4px; }
    </style>
</head>
<body id="heroBody">

    <div class="shaan">BHILAI KI SHAAN</div>
    <h1 class="name">ANCHOR PRANIT</h1>

    <div class="poster-area">
        <div class="parda-box">
            <div class="parda-text">Anchor<br>Pranit</div>
        </div>
        <img src="1001089154jpg.jpg" class="hero-banner" alt="Pranit Banner">
    </div>

    <div class="video-grid">
        <div class="v-card"><video poster="thumb1.jpg" controls playsinline><source src="vid1.mp4" type="video/mp4"></video></div>
        <div class="v-card"><video poster="thumb2.jpg" controls playsinline><source src="vid2.mp4" type="video/mp4"></video></div>
        <div class="v-card"><video poster="thumb3.jpg" controls playsinline><source src="vid3.mp4" type="video/mp4"></video></div>
    </div>

    <div class="map-section">
        <div class="map-box">
            <svg viewBox="0 0 500 500" class="wagon-wheel-svg">
                <path fill="#1a1a1a" stroke="var(--gold)" stroke-width="2" d="M150,50 L350,100 L450,250 L350,400 L150,450 L50,300 Z" />
                <line x1="250" y1="250" x2="350" y2="100" stroke="#fff" stroke-width="2" />
                <line x1="250" y1="250" x2="100" y2="350" stroke="#fff" stroke-width="2" />
                <line x1="250" y1="250" x2="450" y2="250" stroke="#fff" stroke-width="2" />
                <circle cx="250" cy="250" r="10" fill="var(--gold)" />
            </svg>
        </div>
    </div>

    <div class="contact-bar">
        <a href="tel:7000046203" class="c-btn">CALL <span class="g-num">7000046203</span></a>
        <a href="tel:9371740005" class="c-btn">BOOKING <span class="g-num">9371740005</span></a>
    </div>

    <script>
        window.onload = function() {
            setTimeout(function() {
                document.getElementById('heroBody').classList.add('open-curtain');
            }, 800); // 0.8s par parda khulega
        };
    </script>
</body>
</html>
