<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Anchor Pranit | The National Voice</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --gold-fill: linear-gradient(to bottom, #cfa64e 0%, #ffffff 50%, #af8b3b 100%); --bg: #000; }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background: var(--bg); color: #fff; font-family: 'Poppins', sans-serif; overflow-x: hidden; }

        /* STAR ENTRY ANIMATION */
        #star-entry {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #000; z-index: 10000; display: flex; flex-direction: column;
            justify-content: center; align-items: center; animation: slideOut 4.5s forwards;
        }
        .intro-word { font-size: 1.8rem; font-weight: 800; background: var(--gold-fill); -webkit-background-clip: text; -webkit-text-fill-color: transparent; letter-spacing: 8px; opacity: 0; animation: flashWord 1.5s forwards; }
        @keyframes flashWord { 0% { opacity: 0; filter: blur(10px); } 100% { opacity: 1; filter: blur(0); } }
        @keyframes slideOut { 85% { opacity: 1; } 100% { transform: translateY(-100%); visibility: hidden; } }

        /* TEXT FILLING DESIGN (The PRANIT Name) */
        .hero-section { padding: 80px 20px; text-align: center; background: radial-gradient(circle, #222 0%, #000 100%); }
        .filling-text { 
            font-size: 4rem; font-weight: 900; text-transform: uppercase;
            background: var(--gold-fill); -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 5px 15px rgba(212,175,55,0.6));
            letter-spacing: 2px; position: relative; display: inline-block;
        }
        .filling-text::after {
            content: "PRANIT"; position: absolute; left: 0; top: 0;
            z-index: -1; text-shadow: 4px 4px 0px #443510, 8px 8px 15px rgba(0,0,0,0.8);
        }

        .hero-poster { width: 90%; max-width: 400px; border-radius: 20px; border: 2px solid #333; margin-top: 30px; box-shadow: 0 20px 40px rgba(0,0,0,0.8); }

        /* CRICKET STYLE DYNAMIC WAGON WHEEL */
        .wagon-section { padding: 40px 20px; text-align: center; }
        .wheel-container { 
            width: 300px; height: 300px; margin: 0 auto; border-radius: 50%;
            border: 1px solid #222; position: relative; background: url('https://upload.wikimedia.org/wikipedia/commons/e/e0/India_map_blank.svg') center/contain no-repeat;
            opacity: 0.8;
        }
        .hub { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); background: #fff; color: #000; padding: 4px 12px; border-radius: 50px; font-weight: 900; font-size: 0.7rem; z-index: 10; border: 2px solid #cfa64e; }
        .laser-line { position: absolute; height: 2px; background: linear-gradient(90deg, #fff, #cfa64e, transparent); width: 140px; top: 50%; left: 50%; transform-origin: left; animation: laser 3s infinite; }
        @keyframes laser { 0% { width: 0; opacity: 1; } 100% { width: 160px; opacity: 0; } }

        /* VIDEO & GALLERY POPUP */
        .v-scroll { display: flex; overflow-x: auto; gap: 15px; padding: 20px; }
        .v-item { flex: 0 0 85%; height: 500px; border-radius: 25px; overflow: hidden; border: 2px solid #222; }
        
        .gallery { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; padding: 20px; }
        .gallery img { width: 100%; height: 140px; object-fit: cover; border-radius: 12px; transition: 0.3s; }
        .gallery img:active { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%) scale(2.5); z-index: 11000; box-shadow: 0 0 0 1000px rgba(0,0,0,0.9); }

        /* DIGITAL VISITING CARD AUTOMATION BAR */
        .visiting-card-bar { 
            position: fixed; bottom: 0; width: 100%; background: linear-gradient(to top, #111, rgba(0,0,0,0.9));
            border-top: 1px solid #cfa64e; display: flex; justify-content: space-around; padding: 15px 0; z-index: 1000;
        }
        .nav-btn { color: #fff; text-decoration: none; text-align: center; font-weight: bold; font-size: 0.7rem; }
        .wa-glow { color: #25d366; font-size: 1.6rem; filter: drop-shadow(0 0 5px #25d366); }
    </style>
</head>
<body>

    <div id="star-entry">
        <div class="intro-word" style="animation-delay: 0.5s;">THE VOICE</div>
        <div class="intro-word" style="animation-delay: 1.5s;">THE ENERGY</div>
        <div class="intro-word" style="animation-delay: 2.5s;">PRANIT ANCHOR</div>
    </div>

    <div class="hero-section">
        <h1 class="filling-text">PRANIT</h1>
        <p style="color: #aaa; letter-spacing: 5px; margin-top: 10px;">BHILAI'S PRIDE • INDIA'S VOICE</p>
        <img src="1001089154jpg.jpg" class="hero-poster">
    </div>

    <div class="wagon-section">
        <h2 style="color: #cfa64e; letter-spacing: 3px; margin-bottom: 20px;">NATIONAL FOOTPRINT</h2>
        <div class="wheel-container">
            <div class="hub">BHILAI</div>
            <div class="laser-line" style="transform: rotate(0deg);"></div>
            <div class="laser-line" style="transform: rotate(60deg); animation-delay: 0.5s;"></div>
            <div class="laser-line" style="transform: rotate(120deg); animation-delay: 1s;"></div>
            <div class="laser-line" style="transform: rotate(180deg); animation-delay: 1.5s;"></div>
            <div class="laser-line" style="transform: rotate(240deg); animation-delay: 2s;"></div>
            <div class="laser-line" style="transform: rotate(300deg); animation-delay: 2.5s;"></div>
        </div>
        <p style="color: #666; font-size: 0.7rem; margin-top: 15px;">MUMBAI • DELHI • PUNE • GOA • INDORE</p>
    </div>

    <h2 style="text-align: center; color: #cfa64e; margin-top: 40px;">PERFORMANCES</h2>
    <div class="v-scroll">
        <div class="v-item"><iframe width="100%" height="100%" src="https://www.youtube.com/embed/8nSQub7WxqY" frameborder="0"></iframe></div>
        <div class="v-item"><iframe width="100%" height="100%" src="https://www.youtube.com/embed/8us7_eIYkKY" frameborder="0"></iframe></div>
        <div class="v-item"><iframe width="100%" height="100%" src="https://www.youtube.com/embed/eb2c1VEZ_cs" frameborder="0"></iframe></div>
    </div>

    <h2 style="text-align: center; color: #cfa64e; margin-top: 40px;">MOMENTS</h2>
    <div class="gallery">
        <img src="FB_IMG_1776976796509.jpg">
        <img src="FB_IMG_1776976802542.jpg">
        <img src="FB_IMG_1776976813216.jpg">
        <img src="FB_IMG_1776976829871.jpg">
        <img src="FB_IMG_1776976838389.jpg">
        <img src="FB_IMG_1776976845221.jpg">
    </div>

    <footer style="padding: 40px 20px 120px; text-align: center; color: #444;">
        <p>Charoda, Bhilai, Chhattisgarh</p>
        <p style="margin-top: 15px;">Branding by <span style="color: #cfa64e; font-weight: bold;">Prachi CREATION</span></p>
    </footer>

    <div class="visiting-card-bar">
        <a href="tel:7000046203" class="nav-btn">
            <i class="fas fa-phone-alt" style="color: #cfa64e; font-size: 1.4rem;"></i><br>CALL NOW
        </a>
        <a href="https://wa.me/917000046203" class="nav-btn">
            <i class="fab fa-whatsapp wa-glow"></i><br>WHATSAPP
        </a>
    </div>

</body>
</html>
