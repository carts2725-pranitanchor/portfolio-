<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Anchor Pranit | Official Portfolio</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --gold: #d4af37; --bg: #000; }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background: var(--bg); color: #fff; font-family: 'Poppins', sans-serif; overflow-x: hidden; text-align: center; }

        /* HERO & HEADER */
        .hero { padding: 60px 20px; }
        .pranit-name { font-size: 3.5rem; font-weight: 900; background: linear-gradient(to bottom, #f1c40f, #e67e22); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin-bottom: 10px; }
        .hero-img { width: 95%; max-width: 400px; border: 3px solid var(--gold); border-radius: 20px; box-shadow: 0 0 30px rgba(212,175,55,0.4); }

        /* PAN INDIA MAP */
        .map-section { padding: 40px 15px; margin: 20px; background: #0a0a0a; border-radius: 25px; border: 1px solid #222; }
        .india-map { width: 100%; max-width: 600px; border-radius: 15px; border: 2px solid var(--gold); }

        /* REVIEWS */
        .review-card { background: #111; padding: 20px; border-radius: 15px; border-left: 5px solid var(--gold); margin: 15px; text-align: left; }
        .stars { color: #f1c40f; margin-bottom: 5px; }

        /* VIDEOS & PHOTOS */
        .v-slider { display: flex; overflow-x: auto; gap: 15px; padding: 20px; }
        .v-item { flex: 0 0 85%; height: 400px; border-radius: 20px; border: 2px solid #333; overflow: hidden; }
        .gallery-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; padding: 15px; }
        .gallery-grid img { width: 100%; height: 110px; object-fit: cover; border-radius: 10px; border: 1px solid #222; }

        /* FIXED DUAL NUMBER BAR (FIXED) */
        .contact-footer { 
            position: fixed; bottom: 0; width: 100%; background: #000; 
            border-top: 2px solid var(--gold); display: grid; 
            grid-template-columns: 1fr 1fr; /* Dono ko barabar jagah */
            padding: 10px 5px; z-index: 10000; gap: 5px;
        }
        .c-btn { 
            color: #fff; text-decoration: none; font-size: 0.7rem; 
            font-weight: bold; background: #111; padding: 8px 2px;
            border-radius: 10px; border: 1px solid #333;
        }
        .c-btn i { color: var(--gold); font-size: 1.1rem; margin-bottom: 4px; display: block; }
        .gold-num { color: var(--gold); display: block; font-size: 0.8rem; margin-top: 2px; }

        .footer-text { padding: 40px 20px 140px; color: #444; font-size: 0.8rem; }
    </style>
</head>
<body>

    <div class="hero">
        <h1 class="pranit-name">PRANIT</h1>
        <img src="1001089154jpg.jpg" class="hero-img">
    </div>

    <div class="map-section">
        <h2 style="color: var(--gold); margin-bottom: 15px;">PAN INDIA PRESENCE</h2>
        <img src="1001091123.png" class="india-map">
    </div>

    <div class="review-card">
        <div class="stars"><i class="fas fa-star"></i><i class="fas fa-star"></i><i class="fas fa-star"></i><i class="fas fa-star"></i><i class="fas fa-star"></i></div>
        <p>"Outstanding energy and professionalism!"</p>
        <small style="color: var(--gold);">- Corporate Client</small>
    </div>

    <h2 style="color: var(--gold);">10 STAR VIDEOS</h2>
    <div class="v-slider">
        <div class="v-item"><iframe width="100%" height="100%" src="https://www.youtube.com/embed/8nSQub7WxqY" frameborder="0"></iframe></div>
        <div class="v-item"><iframe width="100%" height="100%" src="https://www.youtube.com/embed/8us7_eIYkKY" frameborder="0"></iframe></div>
        <div class="v-item"><iframe width="100%" height="100%" src="https://www.youtube.com/embed/eb2c1VEZ_cs" frameborder="0"></iframe></div>
    </div>

    <h2 style="color: var(--gold); margin-top: 20px;">16 STAR PHOTOS</h2>
    <div class="gallery-grid">
        <img src="FB_IMG_1776976796509.jpg"> <img src="FB_IMG_1776976802542.jpg"> <img src="FB_IMG_1776976813216.jpg">
        <img src="1001090726.jpg"> <img src="1001090728.jpg"> <img src="1001090727.jpg">
        <img src="1001090724.jpg"> <img src="1001090725.jpg"> <img src="FB_IMG_1776976829871.jpg">
        <img src="FB_IMG_1776976838389.jpg"> <img src="FB_IMG_1776976845221.jpg"> <img src="1001090720.jpg">
        <img src="FB_IMG_1776976796509.jpg"> <img src="FB_IMG_1776976802542.jpg"> <img src="FB_IMG_1776976813216.jpg">
        <img src="FB_IMG_1776976829871.jpg">
    </div>

    <div class="footer-text">
        <p>CHARODA, BHILAI, CHHATTISGARH</p>
        <p style="margin-top: 10px;">Branding by <b>Prachi CREATION</b></p>
    </div>

    <div class="contact-footer">
        <a href="tel:7000046203" class="c-btn">
            <i class="fas fa-phone-alt"></i> CALL BHILAI
            <span class="gold-num">7000046203</span>
        </a>
        <a href="tel:9371740005" class="c-btn">
            <i class="fas fa-briefcase"></i> BOOKING
            <span class="gold-num">9371740005</span>
        </a>
    </div>

</body>
</html>
